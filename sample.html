<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dropdown Example</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a0a2a;
      color: #fff;
      padding: 50px;
    }

    /* Dropdown container */
    .dropdown {
      position: relative; /* Needed for absolute positioning of dropdown items */
      display: inline-block;
    }

    /* Dropdown button */
    .dropbtn {
      background-color: #2d2f66;
      color: white;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .dropbtn:hover {
      background-color: #3a3d85;
    }

    /* Dropdown menu content (hidden by default) */
    .dropdown-content {
      display: none; /* Hidden initially */
      position: absolute;
      background-color: #2d2f66;
      min-width: 180px;
      border-radius: 8px;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
      z-index: 1;
    }

    /* Links inside dropdown */
    .dropdown-content a {
      color: white;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .dropdown-content a:hover {
      background-color: #3a3d85;
    }

    /* Show dropdown on hover */
    .dropdown:hover .dropdown-content {
      display: block;
    }
  </style>
</head>
<body>

  <div class="dropdown">
    <button class="dropbtn">Units ▾</button>
    <div class="dropdown-content">
      <a href="#">Celsius (°C)</a>
      <a href="#">Fahrenheit (°F)</a>
      <a href="#">Kelvin (K)</a>
    </div>
  </div>

</body>
</html>
